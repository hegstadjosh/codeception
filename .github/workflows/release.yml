name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build recon
        run: cargo build --manifest-path server/Cargo.toml --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUT_DIR="server/target/${{ matrix.target }}/release"
          cd "$OUT_DIR"
          tar czf "recon-v${VERSION}-${{ matrix.target }}.tar.gz" recon

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: server/target/${{ matrix.target }}/release/recon-v*-${{ matrix.target }}.tar.gz

  publish-npm:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone app
        env:
          CODECEPTION_SKIP_POSTINSTALL: "1"
        run: pnpm build

      - name: Publish npm package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
